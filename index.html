<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gajah Mas Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f8fafc; display: flex; }
        .sidebar { width: 220px; height: 100vh; background: #0f172a; color: white; padding: 20px; position: fixed; }
        .main { margin-left: 220px; padding: 25px; width: calc(100% - 220px); }
        .table-container { background: white; border-radius: 8px; border: 1px solid #e2e8f0; padding: 15px; width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
        th, td { padding: 8px; border: 1px solid #e2e8f0; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #f1f5f9; }
        .filter-bar { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; border: 1px solid #e2e8f0; }
        button { cursor: pointer; padding: 4px 8px; background: #e2e8f0; border: none; border-radius: 3px; font-size: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-weight:bold; margin-bottom:30px; font-size:18px;">🐘 Gajah Mas</div>
        <label for="fileInput" style="display:block; padding:10px; color:#cbd5e1; cursor:pointer; border: 1px dashed #cbd5e1; border-radius: 5px;">Upload Data (CSV)</label>
        <input type="file" id="fileInput" style="display:none" accept=".csv">
    </div>

    <div class="main">
        <div class="filter-bar">
            <input type="date" id="filterTgl">
            <select id="filterSales">
                <option value="">Semua Sales</option><option value="RAJU">RAJU</option><option value="HAFID">HAFID</option><option value="JOSSY">JOSSY</option>
            </select>
            <button onclick="applyFilter()" style="padding: 8px 16px; background: #059669; color: white; border-radius: 4px; font-weight: bold;">Terapkan Filter</button>
        </div>

        <div class="table-container">
            <table id="mainTable">
                <thead>
                    <tr><th>Sales</th><th>Tanggal</th><th>Faktur</th><th>Produk</th><th>Jml</th><th>Satuan</th><th>H.Beli</th><th>Disc</th><th>H.Jual</th><th>Nominal</th><th>Bayar</th><th>Profit</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function applyFilter() {
            const vTgl = document.getElementById('filterTgl').value;
            const vSales = document.getElementById('filterSales').value;
            const rows = document.querySelectorAll('#tableBody tr');
            
            rows.forEach(r => {
                let tglRaw = r.cells[1].innerText.trim();
                let p = tglRaw.split('/');
                let tISO = p.length === 3 ? `20${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` : "";
                
                const matchSales = (vSales === "" || r.cells[0].innerText.trim() === vSales);
                const matchTgl = (vTgl === "" || tISO === vTgl);
                
                r.style.display = (matchSales && matchTgl) ? "" : "none";
            });
        }

        document.getElementById('fileInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const lines = evt.target.result.split('\n');
                let html = '';
                lines.forEach((line, i) => {
                    if(i === 0 || line.trim() == "") return;
                    let c = line.replace(/"/g, '').split(',');
                    if(c.length < 12) return;
                    html += `<tr>${c.map(v=>`<td>${v}</td>`).join('')}<td><button onclick="editRow(this)">Edit</button><button onclick="this.closest('tr').remove()">Hapus</button></td></tr>`;
                });
                document.getElementById('tableBody').innerHTML = html;
                localStorage.setItem('gajahMasData', html);
            };
            reader.readAsText(e.target.files[0]);
        };

        function editRow(b) {
            const r = b.closest('tr');
            if (r.contentEditable == "true") {
                r.contentEditable = "false";
                b.innerText = "Edit";
                localStorage.setItem('gajahMasData', document.getElementById('tableBody').innerHTML);
            } else {
                r.contentEditable = "true";
                b.innerText = "Simpan";
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('gajahMasData');
            if (saved) document.getElementById('tableBody').innerHTML = saved;
        };
    </script>
</body>
</html>
