<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gajah Mas Cloud Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f8fafc; display: flex; }
        .sidebar { width: 220px; height: 100vh; background: #0f172a; color: white; padding: 20px; position: fixed; }
        .main { margin-left: 220px; padding: 25px; width: calc(100% - 220px); }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; position: relative; } .main { margin-left: 0; width: 100%; } .summary-grid, .sales-grid { grid-template-columns: 1fr !important; } }
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .sales-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .metric, .sales-card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .table-container { background: white; border-radius: 8px; padding: 10px; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 8px; border: 1px solid #e2e8f0; }
        button { cursor: pointer; padding: 5px 10px; background: #059669; color: white; border: none; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-weight:bold; margin-bottom:20px;">🐘 Gajah Mas</div>
        <label for="fileInput" style="display:block; padding:10px; border: 1px dashed #cbd5e1; cursor:pointer; font-size: 12px;">Upload CSV</label>
        <input type="file" id="fileInput" style="display:none" accept=".csv">
    </div>

    <div class="main">
        <div class="summary-grid">
            <div class="metric"><small>Cash</small><div id="tot-cash">Rp 0</div></div>
            <div class="metric"><small>Tempo</small><div id="tot-tempo">Rp 0</div></div>
            <div class="metric"><small>P.Cash</small><div id="tot-p-cash">Rp 0</div></div>
            <div class="metric"><small>P.Tempo</small><div id="tot-p-tempo">Rp 0</div></div>
        </div>
        <div class="sales-grid">
            <div class="sales-card"><b>RAJU</b><div id="v-RAJU-data">C:0 T:0 PC:0 PT:0</div></div>
            <div class="sales-card"><b>HAFID</b><div id="v-HAFID-data">C:0 T:0 PC:0 PT:0</div></div>
            <div class="sales-card"><b>JOSSY</b><div id="v-JOSSY-data">C:0 T:0 PC:0 PT:0</div></div>
        </div>
        <div class="table-container">
            <table id="mainTable">
                <thead><tr><th>Sales</th><th>Tanggal</th><th>Faktur</th><th>Produk</th><th>Jml</th><th>Satuan</th><th>H.Beli</th><th>Disc</th><th>H.Jual</th><th>Nominal</th><th>Bayar</th><th>Profit</th><th>Aksi</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6nSBFiYD7gsjl73vA_iW4xCGgwfrpVJY",
            authDomain: "gajahmasprofit.firebaseapp.com",
            databaseURL: "https://gajahmasprofit-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gajahmasprofit",
            storageBucket: "gajahmasprofit.appspot.com",
            messagingSenderId: "786234727258",
            appId: "1:786234727258:web:6a63396c202b5edb993163"
        };

        const app = !getApps().length ? initializeApp(firebaseConfig) : getApps()[0];
        const db = getDatabase(app);

        window.hitung = () => {
            let totals = { RAJU: {C:0, T:0, PC:0, PT:0}, HAFID: {C:0, T:0, PC:0, PT:0}, JOSSY: {C:0, T:0, PC:0, PT:0} };
            let gC=0, gT=0, gPC=0, gPT=0;
            document.querySelectorAll('#tableBody tr').forEach(r => {
                const c = r.getElementsByTagName('td');
                if(c.length < 12) return;
                const sales = c[0].innerText.trim(), n = parseFloat(c[9].innerText.replace(/[^0-9.-]+/g,''))||0, p = parseFloat(c[11].innerText.replace(/[^0-9.-]+/g,''))||0, isT = c[10].innerText.includes('Kredit');
                if(totals[sales]) {
                    if(isT) { totals[sales].T+=n; totals[sales].PT+=p; gT+=n; gPT+=p; } 
                    else { totals[sales].C+=n; totals[sales].PC+=p; gC+=n; gPC+=p; }
                }
            });
            document.getElementById('tot-cash').innerText = 'Rp ' + gC.toLocaleString();
            document.getElementById('tot-tempo').innerText = 'Rp ' + gT.toLocaleString();
            document.getElementById('tot-p-cash').innerText = 'Rp ' + gPC.toLocaleString();
            document.getElementById('tot-p-tempo').innerText = 'Rp ' + gPT.toLocaleString();
            Object.keys(totals).forEach(s => document.getElementById(`v-${s}-data`).innerText = `C:${totals[s].C.toLocaleString()} T:${totals[s].T.toLocaleString()} PC:${totals[s].PC.toLocaleString()} PT:${totals[s].PT.toLocaleString()}`);
        };

        onValue(ref(db, 'penjualan/data'), (s) => { if(s.val()) { document.getElementById('tableBody').innerHTML = s.val().html; hitung(); } });
        window.saveToCloud = () => { set(ref(db, 'penjualan/data'), { html: document.getElementById('tableBody').innerHTML }); hitung(); };
        
        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                document.getElementById('tableBody').innerHTML = evt.target.result.split('\n').slice(1).map(r => `<tr>${r.split(',').map(c => `<td>${c}</td>`).join('')}<td><button onclick="window.del(this)">Hapus</button></td></tr>`).join('');
                window.saveToCloud();
            };
            reader.readAsText(e.target.files[0]);
        };
        window.del = (btn) => { btn.closest('tr').remove(); window.saveToCloud(); };
    </script>
</body>
</html>
