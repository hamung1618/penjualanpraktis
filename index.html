<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gajah Mas Dashboard</title>
    <style>
        body { font-family: sans-serif; display: flex; background: #f8fafc; }
        .sidebar { width: 220px; height: 100vh; background: #0f172a; color: white; padding: 20px; position: fixed; }
        .main { margin-left: 220px; padding: 20px; width: 100%; }
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .sales-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .metric, .sales-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .sales-card b { display: block; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 8px; border: 1px solid #e2e8f0; font-size: 11px; }
        button { cursor: pointer; padding: 4px 8px; border: none; border-radius: 3px; color: white; margin-right: 5px; }
        .btn-edit { background: #059669; }
        .btn-hapus { background: #dc2626; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>🐘 Gajah Mas</div>
        <label for="fileInput" style="display:block; margin-top:20px; cursor:pointer;">Upload CSV</label>
        <input type="file" id="fileInput" style="display:none" accept=".csv">
    </div>

    <div class="main">
        <div class="summary-grid">
            <div class="metric"><small>Cash</small><div id="tot-cash">Rp 0</div></div>
            <div class="metric"><small>Tempo</small><div id="tot-tempo">Rp 0</div></div>
            <div class="metric"><small>P.Cash</small><div id="tot-p-cash">Rp 0</div></div>
            <div class="metric"><small>P.Tempo</small><div id="tot-p-tempo">Rp 0</div></div>
        </div>
        <div class="sales-grid">
            <div class="sales-card"><b>RAJU</b><div id="v-RAJU-data" style="font-size:10px;"></div></div>
            <div class="sales-card"><b>HAFID</b><div id="v-HAFID-data" style="font-size:10px;"></div></div>
            <div class="sales-card"><b>JOSSY</b><div id="v-JOSSY-data" style="font-size:10px;"></div></div>
        </div>
        <table>
            <thead><tr><th>Sales</th><th>Tanggal</th><th>Faktur</th><th>Produk</th><th>Jml</th><th>Satuan</th><th>H.Beli</th><th>Disc</th><th>H.Jual</th><th>Nominal</th><th>Bayar</th><th>Profit</th><th>Aksi</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6nSBFiYD7gsjl73vA_iW4xCGgwfrpVJY",
            authDomain: "gajahmasprofit.firebaseapp.com",
            databaseURL: "https://gajahmasprofit-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gajahmasprofit",
            storageBucket: "gajahmasprofit.appspot.com",
            messagingSenderId: "786234727258",
            appId: "1:786234727258:web:6a63396c202b5edb993163"
        };

        const app = !getApps().length ? initializeApp(firebaseConfig) : getApps()[0];
        const db = getDatabase(app);

        window.hitung = () => {
            let sD = { RAJU:{C:0,T:0,PC:0,PT:0}, HAFID:{C:0,T:0,PC:0,PT:0}, JOSSY:{C:0,T:0,PC:0,PT:0} };
            let gC=0, gT=0, gPC=0, gPT=0;
            document.querySelectorAll('#tableBody tr').forEach(r => {
                const c = r.getElementsByTagName('td');
                if(c.length < 12) return;
                const s = c[0].innerText.replace(/"/g,'').trim(), n = parseFloat(c[9].innerText.replace(/[^0-9.-]+/g,''))||0, p = parseFloat(c[11].innerText.replace(/[^0-9.-]+/g,''))||0, isT = c[10].innerText.includes('Kredit');
                if(sD[s]) { 
                    if(isT) { sD[s].T+=n; sD[s].PT+=p; gT+=n; gPT+=p; } 
                    else { sD[s].C+=n; sD[s].PC+=p; gC+=n; gPC+=p; } 
                }
            });
            document.getElementById('tot-cash').innerText = 'Rp ' + gC.toLocaleString();
            document.getElementById('tot-tempo').innerText = 'Rp ' + gT.toLocaleString();
            document.getElementById('tot-p-cash').innerText = 'Rp ' + gPC.toLocaleString();
            document.getElementById('tot-p-tempo').innerText = 'Rp ' + gPT.toLocaleString();
            Object.keys(sD).forEach(s => document.getElementById(`v-${s}-data`).innerHTML = `Cash: ${sD[s].C.toLocaleString()}<br>Tempo: ${sD[s].T.toLocaleString()}<br>P.Cash: ${sD[s].PC.toLocaleString()}<br>P.Tempo: ${sD[s].PT.toLocaleString()}`);
        };

        onValue(ref(db, 'penjualan/data'), (s) => { if(s.val()) { document.getElementById('tableBody').innerHTML = s.val().html; hitung(); } });
        window.saveToCloud = () => { set(ref(db, 'penjualan/data'), { html: document.getElementById('tableBody').innerHTML }); hitung(); };
        
        window.edit = (btn) => {
            const r = btn.closest('tr');
            if(r.contentEditable === "true") { r.contentEditable = "false"; btn.innerText = "Edit"; saveToCloud(); }
            else { r.contentEditable = "true"; btn.innerText = "Simpan"; }
        };
        window.del = (btn) => { btn.closest('tr').remove(); saveToCloud(); };

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                document.getElementById('tableBody').innerHTML = evt.target.result.split('\n').slice(1).filter(l=>l).map(r => `<tr>${r.split(',').map(c => `<td>${c.replace(/"/g,'')}</td>`).join('')}<td><button class="btn-edit" onclick="window.edit(this)">Edit</button><button class="btn-hapus" onclick="window.del(this)">Hapus</button></td></tr>`).join('');
                saveToCloud();
            };
            reader.readAsText(e.target.files[0]);
        };
    </script>
</body>
</html>
